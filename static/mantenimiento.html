<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>MUNDOTEC — Sitio en construcción</title>
  <style>
    * { box-sizing:border-box; margin:0; padding:0; }
    body {
      font-family:'Segoe UI',system-ui,sans-serif;
      background:linear-gradient(135deg,#0d1b2a 0%,#1E4E8C 100%);
      min-height:100vh; display:flex; align-items:center; justify-content:center;
      color:#fff; text-align:center; padding:2rem;
    }
    .card {
      background:rgba(255,255,255,.07); border:1px solid rgba(255,255,255,.12);
      border-radius:20px; padding:3rem 2.5rem; max-width:480px; width:100%;
      backdrop-filter:blur(10px);
    }
    .logo { font-size:2rem; font-weight:800; margin-bottom:.3rem; letter-spacing:-1px; }
    .logo span { color:#E67E22; }
    .icon { font-size:3.5rem; margin:1.5rem 0 1rem; }
    h1 { font-size:1.4rem; font-weight:700; margin-bottom:.8rem; }
    p { font-size:.95rem; color:rgba(255,255,255,.7); line-height:1.6; margin-bottom:.6rem; }
    .divider { border:none; border-top:1px solid rgba(255,255,255,.1); margin:1.5rem 0; }
    .contact { font-size:.85rem; color:rgba(255,255,255,.5); }
    .contact a { color:#E67E22; text-decoration:none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">MUNDO<span>TEC</span></div>
    <div class="icon">🚧</div>
    <h1>Sitio en construcción</h1>
    <p>Estamos trabajando para ofrecerle una mejor experiencia.</p>
    <p>Próximamente nuestro catálogo y servicios estarán disponibles en línea.</p>
    <hr class="divider">
    <p class="contact">
      ¿Necesita atención inmediata?<br>
      Escríbanos a <a href="mailto:info@mundoteconline.com">info@mundoteconline.com</a>
    </p>
  </div>
</body>
</html>
